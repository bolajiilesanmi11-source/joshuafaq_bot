services:
  - type: web
    name: smm-telegram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot.main:init_webhook_app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: DATABASE_URL
        fromDatabase:
          name: smm-bot-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: WEBHOOK_URL
        sync: false

  - type: worker
    name: smm-bot-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m workers.cron_jobs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smm-bot-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false

databases:
  - name: smm-bot-db
    plan: free
    postgresVersion: 16
